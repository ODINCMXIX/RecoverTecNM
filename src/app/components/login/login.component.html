<p>login works!</p>
<div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card">
          <div class="card-header text-center" style="background-color: #5f44e6b7; color: white;">
            <h3>Inicio de Sesión</h3>
          </div>
          <div class="card-body">
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
              <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" formControlName="email" class="form-control" placeholder="Ingresa tu correo">
                <div *NgIf="expression"If="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-danger">
                  El correo es requerido y debe tener un formato válido.
                </div>
              </div>
              <div class="form-group mt-3">
                <label for="password">Contraseña</label>
                <input type="password" id="password" formControlName="password" class="form-control" placeholder="Ingresa tu contraseña">
                <div *NgIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-danger">
                  La contraseña es requerida.
                </div>
              </div>
              <button style="background-color: #2b00ff; color: white;" type="submit" class="btn btn-primary w-100 mt-3" [disabled]="loginForm.invalid">Iniciar Sesión</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
